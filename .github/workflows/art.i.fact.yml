name: NodeJS with Webpack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.1

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Configure @world-os package access
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          WORLD_OS_NPM_REGISTRY: ${{ vars.WORLD_OS_NPM_REGISTRY }}
        run: |
          set -euo pipefail
          REGISTRY="${WORLD_OS_NPM_REGISTRY:-https://registry.npmjs.org}"
          HOST="${REGISTRY#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%/}"
          if [ -n "${NPM_TOKEN:-}" ]; then
            {
              echo "@world-os:registry=${REGISTRY}"
              echo "//${HOST}/:_authToken=${NPM_TOKEN}"
              echo "always-auth=true"
            } >> .npmrc
            echo "Configured npm auth for @world-os via ${REGISTRY}"
          else
            echo "NPM_TOKEN not set; rewriting @world-os/* deps to workspace:* for CI"
            python - <<'PY'
            import glob
            import json
            changed = 0
            patterns = [
                "apps/*/package.json",
                "packages/*/package.json",
                "ui/**/package.json",
                "api/**/package.json",
                "tools/**/package.json",
            ]
            for pattern in patterns:
                for path in glob.glob(pattern, recursive=True):
                    try:
                        with open(path, "r", encoding="utf-8") as fh:
                            data = json.load(fh)
                    except Exception:
                        continue
                    dirty = False
                    for section in ("dependencies", "devDependencies", "optionalDependencies", "peerDependencies"):
                        deps = data.get(section)
                        if not isinstance(deps, dict):
                            continue
                        for name, version in list(deps.items()):
                            if name.startswith("@world-os/") and not str(version).startswith("workspace:"):
                                deps[name] = "workspace:*"
                                dirty = True
                    if dirty:
                        with open(path, "w", encoding="utf-8") as fh:
                            json.dump(data, fh, indent=2)
                            fh.write("\n")
                        changed += 1
            print(f"Updated {changed} package manifest(s) for @world-os workspace fallback.")
            PY
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: pnpm build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webpack-artifact-${{ matrix.node-version }}
          path: dist/
