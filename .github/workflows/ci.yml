name: CI

on:
  pull_request:
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  behavior:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Behavior validator (fast)
        run: |
          bash scripts/run_behavior_validator.sh

      - name: Upload staging artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-behavior
          path: staging/

  receipts:
    runs-on: ubuntu-latest
    needs: behavior
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: ReceiptOps v2 validator (constitutional gate)
        run: |
          bash scripts/run_receipt_validator.sh

      - name: Upload receipt artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-receipts
          path: staging/
