name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  behavior:
    name: Behavior Validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate MCP 3D agent execution spec pack
        run: python scripts/validate_mcp_3d_agent_execution_spec.py --strict

      - name: Behavior validator (fast)
        run: |
          if [ ! -d tests/behavior/cases ]; then
            echo "No tests/behavior/cases directory found. Skipping behavior gate."
            exit 0
          fi
          sed -i 's/\r$//' scripts/run_behavior_validator.sh
          bash scripts/run_behavior_validator.sh

      - name: Upload behavior artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-behavior
          path: staging/
          if-no-files-found: ignore

  receipts:
    name: Receipt Validator
    runs-on: ubuntu-latest
    needs: behavior
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Receipt validator
        run: |
          if [ ! -d tests/receipts/cases ]; then
            echo "No tests/receipts/cases directory found. Skipping receipt gate."
            exit 0
          fi
          sed -i 's/\r$//' scripts/run_receipt_validator.sh
          bash scripts/run_receipt_validator.sh

      - name: Upload receipt artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-receipts
          path: staging/
          if-no-files-found: ignore

  workspace-install:
    name: Install Workspace Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.7.1"

      - name: Configure @world-os package access
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          WORLD_OS_NPM_REGISTRY: ${{ vars.WORLD_OS_NPM_REGISTRY }}
        run: |
          set -euo pipefail
          REGISTRY="${WORLD_OS_NPM_REGISTRY:-https://registry.npmjs.org}"
          HOST="${REGISTRY#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%/}"
          if [ -n "${NPM_TOKEN:-}" ]; then
            {
              echo "@world-os:registry=${REGISTRY}"
              echo "//${HOST}/:_authToken=${NPM_TOKEN}"
              echo "always-auth=true"
            } >> .npmrc
            echo "Configured npm auth for @world-os via ${REGISTRY}"
          else
            echo "NPM_TOKEN not set; rewriting @world-os/* deps to workspace:* for CI"
            python - <<'PY'
            import glob
            import json
            changed = 0
            patterns = [
                "apps/*/package.json",
                "packages/*/package.json",
                "ui/**/package.json",
                "api/**/package.json",
                "tools/**/package.json",
            ]
            for pattern in patterns:
                for path in glob.glob(pattern, recursive=True):
                    try:
                        with open(path, "r", encoding="utf-8") as fh:
                            data = json.load(fh)
                    except Exception:
                        continue
                    dirty = False
                    for section in ("dependencies", "devDependencies", "optionalDependencies", "peerDependencies"):
                        deps = data.get(section)
                        if not isinstance(deps, dict):
                            continue
                        for name, version in list(deps.items()):
                            if name.startswith("@world-os/") and not str(version).startswith("workspace:"):
                                deps[name] = "workspace:*"
                                dirty = True
                    if dirty:
                        with open(path, "w", encoding="utf-8") as fh:
                            json.dump(data, fh, indent=2)
                            fh.write("\n")
                        changed += 1
            print(f"Updated {changed} package manifest(s) for @world-os workspace fallback.")
            PY
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
