name: "🌌 Gemini OS Pipeline"

on:
  push:
    branches: [main, Merge2Main, "release/**"]
  pull_request:
  workflow_dispatch:
    inputs:
      phase:
        description: "Pipeline phase to run (all|lint|test|embed|telemetry)"
        required: false
        default: "all"
  schedule:
    # 09:00 America/New_York (DST-safe: 13:00 UTC)
    - cron: "0 13 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  GEMINI_MODEL: "gemini-2.0-flash"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.phase == 'all' || github.event.inputs.phase == 'lint' || github.event.inputs.phase == 'test' || github.event.inputs.phase == 'embed' || github.event.inputs.phase == 'telemetry' || github.event.inputs.phase == '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting dependencies
        run: pip install ruff pylint mypy

      - name: Run Ruff
        run: ruff check . --output-format=github || true

      - name: Run Pylint (core modules)
        run: pylint a2a_mcp orchestrator agents schemas --fail-under=7.0 || true

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Test Suite
  # ─────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test Suite"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.phase == 'all' || github.event.inputs.phase == 'test' || github.event.inputs.phase == 'embed' || github.event.inputs.phase == 'telemetry' || github.event.inputs.phase == '' }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev deps
        run: pip install -e .[dev] || pip install -r requirements.txt

      - name: Run tests
        run: bash scripts/gemini_os_runner.sh test
        env:
          DATABASE_URL: sqlite:///./test.db
          LLM_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: output/test-report.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 — Agent Embedding (Vector Data Lake)
  # ─────────────────────────────────────────────────────────────────
  embed:
    name: "🧠 Agent Embed (Vector Lake)"
    runs-on: ubuntu-latest
    needs: test
    if: ${{ (github.event_name != 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Merge2Main')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.phase == 'all' || github.event.inputs.phase == 'embed' || github.event.inputs.phase == 'telemetry' || github.event.inputs.phase == '')) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install embedding dependencies
        run: pip install -e .[dev] numpy || pip install numpy

      - name: Run agent pipeline & produce embeddings
        run: bash scripts/gemini_os_runner.sh embed
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}

      - name: Upload vector artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vector-lake-snapshot
          path: data/vector_lake/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # JOB 4 — Telemetry Flush (Sentry Sink)
  # ─────────────────────────────────────────────────────────────────
  telemetry:
    name: "📡 Telemetry Flush"
    runs-on: ubuntu-latest
    needs: embed
    if: ${{ always() && ((github.event_name != 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Merge2Main')) || (github.event_name == 'workflow_dispatch' && (github.event.inputs.phase == 'all' || github.event.inputs.phase == 'telemetry' || github.event.inputs.phase == ''))) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Download vector artifacts
        uses: actions/download-artifact@v4
        with:
          name: vector-lake-snapshot
          path: data/vector_lake/
        continue-on-error: true

      - name: Install telemetry dependencies
        run: pip install sentry-sdk numpy

      - name: Flush telemetry to Sentry
        run: bash scripts/gemini_os_runner.sh telemetry
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ github.ref_name }}
          SENTRY_RELEASE: ${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────
  # JOB 5 — Drift Guard (nightly invariant check)
  # ─────────────────────────────────────────────────────────────────
  drift-guard:
    name: "🔒 Drift Guard"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install deps
        run: pip install -e .[dev] || pip install -r requirements.txt

      - name: Run drift gate check
        run: bash scripts/gemini_os_runner.sh drift

      - name: Notify on drift
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Drift detected — nightly invariant check failed',
              body: `The nightly drift guard detected invariant violations. Run id: ${{ github.run_id }}`,
              labels: ['drift', 'automated']
            })
