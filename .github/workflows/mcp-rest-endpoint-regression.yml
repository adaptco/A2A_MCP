name: MCP REST Endpoint Regression

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcp-rest-endpoint-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  mcp-rest-endpoint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -r requirements.txt
          pip install pytest

      - name: Run MCP REST endpoint regression test
        run: pytest -q tests/test_mcp_rest_endpoint.py
