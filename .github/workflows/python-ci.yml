name: Python CI

on:
  push:
    branches: [ main, develop, "feature/**", "release/**", constitutional-autogen-workflows ]
  pull_request:
    branches: [ main ]

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Smoke-check Python scripts (syntax + import)
        run: |
          python -m compileall -q app orchestrator schemas scripts agents tests
          python scripts/check_merge_conflicts.py --help

      - name: Run tests (if present)
        run: |
          if [ -f tests/test_settlement_verification.py ]; then
            pytest -q tests/test_settlement_verification.py
          else
            echo "No deterministic settlement tests found; skipping."
          fi
