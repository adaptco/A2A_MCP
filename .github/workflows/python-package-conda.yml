name: Python Package using Conda

permissions:
  contents: read

on:
  push:
    branches: [main, develop, "feature/**", "release/**"]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint with ruff (syntax and undefined names)
        run: |
          TARGETS=(
            agents
            app
            orchestrator
            schemas
            scripts/check_merge_conflicts.py
            scripts/plans
            tools/receipt
            tests/test_settlement_verification.py
            a2a_mcp/app
            a2a_mcp/orchestrator
            a2a_mcp/schemas
            a2a_mcp/scripts/plans
            a2a_mcp/tools/receipt
          )
          EXISTING=()
          for target in "${TARGETS[@]}"; do
            if [ -e "$target" ]; then
              EXISTING+=("$target")
            fi
          done
          if [ "${#EXISTING[@]}" -eq 0 ]; then
            echo "No lint targets found; skipping."
            exit 0
          fi
          ruff check "${EXISTING[@]}" --select F821,E9,F63,F7,F82

      - name: Test with pytest
        run: |
          if [ -f tests/test_settlement_verification.py ]; then
            pytest -q tests/test_settlement_verification.py
          else
            echo "No deterministic settlement tests found; skipping."
          fi
