name: Warehouse Physics Training

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  monotonicity-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run monotonicity validator tests
        run: pytest tests/test_monotonicity_validator.py -q
