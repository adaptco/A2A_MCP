apiVersion: v1
kind: ConfigMap
metadata:
  name: charley-fox-config
  namespace: charley-fox
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "charley_fox"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  WEAVIATE_HOST: "weaviate"
  WEAVIATE_PORT: "8080"
  VITE_API_URL: "https://api.charley-fox.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: charley-fox-secrets
  namespace: charley-fox
type: Opaque
stringData:
  DB_PASSWORD: ${DB_PASSWORD:-charley123}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GRAFANA_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
  GF_SECRET_KEY: ${GF_SECRET_KEY:-}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: charley-fox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: charley-fox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: weaviate-pvc
  namespace: charley-fox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
