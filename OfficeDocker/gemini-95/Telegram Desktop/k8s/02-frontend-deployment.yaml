apiVersion: apps/v1
kind: Deployment
metadata:
  name: charley-fox-frontend
  namespace: charley-fox
  labels:
    app: charley-fox
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: charley-fox
      component: frontend
  template:
    metadata:
      labels:
        app: charley-fox
        component: frontend
    spec:
      serviceAccountName: charley-fox
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
      containers:
      - name: frontend
        image: charley-fox/frontend:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
              - ALL
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: charley-fox-config
              key: VITE_API_URL
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: charley-fox-frontend
  namespace: charley-fox
  labels:
    app: charley-fox
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: charley-fox
    component: frontend
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: charley-fox-frontend-hpa
  namespace: charley-fox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: charley-fox-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
