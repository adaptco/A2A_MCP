##############################################################################
# VH2 FRONTEND SOCKET — Kubernetes Deployment
# Serves: plugin demo, vehicle sim (vehicle.html), unit tests (tests.html)
# HPA: 2–5 replicas
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vh2-frontend
  namespace: vh2-prod
  labels:
    app.kubernetes.io/name: vh2-sovereign-validator
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vh2-frontend
  template:
    metadata:
      labels:
        app: vh2-frontend
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      automountServiceAccountToken: false

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: vh2-frontend
                topologyKey: kubernetes.io/hostname

      containers:
        - name: frontend
          image: vh2-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http

          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"

          startupProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12

          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3

          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "250m", memory: "128Mi" }

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      terminationGracePeriodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: vh2-frontend-svc
  namespace: vh2-prod
  labels:
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: vh2-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vh2-frontend-hpa
  namespace: vh2-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vh2-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
