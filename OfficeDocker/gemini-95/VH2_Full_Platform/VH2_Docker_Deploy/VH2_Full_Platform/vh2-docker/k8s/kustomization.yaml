apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vh2-prod

commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: vh2-sovereign-validator

resources:
  - namespace.yaml
  - configmap-spec.yaml
  - redis-statefulset.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - ingress.yaml
  - network-policy.yaml
  - tests-job.yaml
  - hpa.yaml
  - canary-rollout.yaml

images:
  - name: vh2-backend
    newTag: "1.0.0"
  - name: vh2-frontend
    newTag: "1.0.0"

# ConfigMap generator (alternative to inline ConfigMap)
