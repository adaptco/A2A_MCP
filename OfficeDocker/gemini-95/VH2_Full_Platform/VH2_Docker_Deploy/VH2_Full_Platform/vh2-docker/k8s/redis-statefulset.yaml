apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: vh2-prod
data:
  redis.conf: |
    # VH2 Redis Configuration for Agent State Persistence
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfilename "aof.aof"
    appendfsync everysec
    # Disable TCP keepalive in favor of Kubernetes liveness probes
    tcp-keepalive 0
    # Enable monitoring for metrics
    latency-monitor-threshold 100

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vh2-prod
  labels:
    app: redis
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    name: redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: vh2-prod
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        version: "7.0"
    spec:
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
      containers:
      - name: redis
        image: redis:7.0-alpine
        command:
        - redis-server
        - /etc/redis/redis.conf
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/redis
          readOnly: true
        - name: data
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: redis-config
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app: redis
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: standard
      resources:
        requests:
          storage: 1Gi

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-pdb
  namespace: vh2-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: redis
