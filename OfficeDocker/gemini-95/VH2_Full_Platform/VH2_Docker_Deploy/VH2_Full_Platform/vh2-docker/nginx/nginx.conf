worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log  /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # Mobile: larger client buffers for native-size payloads
    client_max_body_size 4m;
    client_body_buffer_size 128k;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "no-referrer" always;
    add_header Permissions-Policy       "geolocation=(), camera=()" always;

    # Cache static assets aggressively (plugin JS, HTML)
    map $uri $cache_control {
        ~\.(js|css|woff2|woff|ttf)$   "public, max-age=31536000, immutable";
        ~\.(html)$                     "public, max-age=300";
        default                        "no-cache";
    }

    upstream backend_api {
        server backend:3001;
        keepalive 32;
    }

    upstream frontend_static {
        server frontend:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── API socket (backend) ─────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection     "";
            proxy_set_header   Host           $host;
            proxy_set_header   X-Real-IP      $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            add_header Cache-Control "no-cache" always;
        }

        location /health {
            proxy_pass http://backend_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Plugin JS endpoint (served from frontend) ────────────────────
        location /vh2-plugin.js {
            proxy_pass         http://frontend_static;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            add_header Cache-Control $cache_control always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── Frontend socket (simulation + plugin demo) ───────────────────
        location / {
            proxy_pass         http://frontend_static;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            add_header Cache-Control $cache_control always;
        }
    }
}
