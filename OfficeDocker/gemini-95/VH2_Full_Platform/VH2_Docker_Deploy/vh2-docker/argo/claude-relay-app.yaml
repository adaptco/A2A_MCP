apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-relay
  annotations:
    resources-finalizer.argocd.argoproj.io: "true"
spec:
  project: default
  source:
    repoURL: https://git.example/sovereign-platform
    path: charts/claude-relay
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/image
