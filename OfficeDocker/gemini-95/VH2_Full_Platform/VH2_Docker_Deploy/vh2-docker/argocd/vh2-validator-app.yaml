---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vh2-sovereign-validator
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: vh2-sovereign-validator
    app.kubernetes.io/part-of: vh2-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "VH2 Sovereign Validator — ET29/22 Fail-Closed Physics Engine"
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  
  # ── SOURCE: Git Repository ────────────────────────────────────────────
  source:
    repoURL: https://github.com/yourorg/vh2-docker.git
    targetRevision: main
    path: k8s
    kustomize:
      version: v5.0.0
      commonLabels:
        managed-by: argocd
        env: production
      commonAnnotations:
        argocd.argoproj.io/sync-wave: "0"
  
  # ── DESTINATION: Kubernetes Cluster ──────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: vh2-prod
  
  # ── SYNC POLICY: Fully Automated ─────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - Validate=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # ── IGNORE DIFFERENCES: Image Tags (dynamic) ──────────────────────────
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/template/spec/containers/0/image
    - /spec/template/spec/containers/1/image
    - /spec/template/spec/initContainers/0/image
  - group: batch
    kind: Job
    jsonPointers:
    - /spec/template/spec/containers/0/image
  
  # ── INFO: Custom Dashboard Display ────────────────────────────────────
  info:
  - name: "Sovereign Status"
    value: "ET29/22 Kimi-validated ✓"
  - name: "Physics Engine"
    value: "12.5° KPI | 45mm Scrub | C5 Symmetry"
  - name: "Test Coverage"
    value: "97 tests | Fail-closed validator | SHA-256 witness"
  - name: "Repository"
    value: "https://github.com/yourorg/vh2-docker"

---
# ── ARGOCD APPLICATION for Notifications ─────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: vh2-argocd-notifications
  namespace: argocd
  labels:
    app.kubernetes.io/name: vh2-sovereign-validator
data:
  notification.on-sync-succeeded: |
    message: |
      ✅ VH2 Sovereign Validator Deployment Succeeded
      
      Application: {{.app.metadata.name}}
      Revision: {{.app.status.operationState.finishedAt}}
      Namespace: {{.app.metadata.namespace}}
      
      Status: SOVEREIGN_PASS
      Witness: 0xVH2_ET29_ET22_C5_SOV_{{.app.status.operationState.syncResult.revision | substr 0 6 | upper}}
      
      All 97 tests passed. Physics engine validated.
      Ready for production rollout.
      
      🏎️ Sovereign physics at scale.
  
  notification.on-sync-failed: |
    message: |
      ❌ VH2 Sovereign Validator Deployment FAILED
      
      Application: {{.app.metadata.name}}
      Error: {{.app.status.operationState.finishedAt}}
      
      Status: SYSTEM_HALT
      Reason: Constraint violation or test failure
      
      Check logs: kubectl logs -f -n {{.app.metadata.namespace}} <pod>
