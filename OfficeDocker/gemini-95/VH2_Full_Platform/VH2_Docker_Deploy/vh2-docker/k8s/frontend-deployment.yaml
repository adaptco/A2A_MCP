---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vh2-frontend
  namespace: vh2-prod
  labels:
    app: vh2-validator
    component: frontend
    version: v1
  annotations:
    description: "VH2 Frontend Socket - Plugin + Static Assets"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vh2-validator
      component: frontend
  template:
    metadata:
      labels:
        app: vh2-validator
        component: frontend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: vh2-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: frontend
        image: vh2-docker-frontend:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: HOST
          value: "0.0.0.0"
        - name: LOG_LEVEL
          value: info
        
        # ── HEALTH CHECKS ────────────────────────────────────────────
        livenessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /tests.html
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        
        startupProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        
        # ── RESOURCES ────────────────────────────────────────────────
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        
        # ── VOLUMES ──────────────────────────────────────────────────
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: public-assets
          mountPath: /app/public
          readOnly: true
      
      # ── VOLUMES ──────────────────────────────────────────────────────
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 128Mi
      - name: public-assets
        configMap:
          name: vh2-frontend-assets
          optional: true
          defaultMode: 0444
      
      # ── SCHEDULING ───────────────────────────────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vh2-validator
                - key: component
                  operator: In
                  values:
                  - frontend
              topologyKey: kubernetes.io/hostname
      
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vh2-frontend
  namespace: vh2-prod
  labels:
    app: vh2-validator
    component: frontend

---
apiVersion: v1
kind: Service
metadata:
  name: vh2-frontend
  namespace: vh2-prod
  labels:
    app: vh2-validator
    component: frontend
  annotations:
    description: "VH2 Frontend Static Service"
spec:
  type: ClusterIP
  selector:
    app: vh2-validator
    component: frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  sessionAffinity: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vh2-frontend-hpa
  namespace: vh2-prod
  labels:
    app: vh2-validator
    component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vh2-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
