// ═══════════════════════════════════════════════════════════════════════
// VH2 UNIT TEST FRAMEWORK
// Tests: geometry invariants, Three.js object integrity,
//        SHA-256 hash, Ackermann kinematics, KPI math, concavity
// ═══════════════════════════════════════════════════════════════════════

// ── CONSTANTS UNDER TEST (mirrors production) ──────────────────────────
const SPECS = {
  schema:          'VH2_Full_v1',
  spoke_count:     5,
  rim_diameter_in: 19,
  front_et_mm:     29,
  rear_et_mm:      22,
  kpi_deg:         12.5,
  scrub_radius_mm: 45,
  c5_sector_deg:   72,
  concavity_front: 0.150,
  concavity_rear:  0.185,
  wheelbase_mm:    2600,
  track_mm:        1460,
  material:        'RSM_PBR_D4AF37',
  sovereignty:     'SAINTLY_HONESTY_TRUE',
};

const KPI_RAD    = 12.5 * Math.PI / 180;
const cosK       = Math.cos(KPI_RAD);
const sinK       = Math.sin(KPI_RAD);
const SCRUB      = 0.225;
const RIM_R      = 1.205;
const TIRE_H     = 0.430;
const WR         = RIM_R + TIRE_H;
const FBW        = 1.205;
const RBW        = 1.335;
const TRACK      = 3.65;
const WBH        = 6.50;
const WY         = WR;
const C5         = [0,72,144,216,288].map(d=>d*Math.PI/180);

// ── TEST FRAMEWORK ─────────────────────────────────────────────────────
const results = [];
let totalPass = 0, totalFail = 0;

function assert(desc, actual, expected, opts={}) {
  const {tol=0, fmt=v=>String(v), suite='default'} = opts;
  const pass = tol > 0
    ? Math.abs(actual - expected) <= tol
    : actual === expected;
  results.push({suite, desc, actual, expected, pass, tol, fmt});
  if(pass) totalPass++; else totalFail++;
  return pass;
}

function assertNear(desc, actual, expected, tol, opts={}) {
  return assert(desc, actual, expected, {...opts, tol});
}

function assertTrue(desc, val, opts={}) {
  return assert(desc, val, true, {...opts, fmt:v=>v?'TRUE':'FALSE'});
}

// ── SUITE 1: PHYSICAL INVARIANTS ───────────────────────────────────────
function testInvariants() {
  const S = 'Physical Invariants';
  assertNear('KPI angle = 12.5°',       KPI_RAD*180/Math.PI,     12.5,   0.0001, {suite:S, fmt:v=>v.toFixed(4)+'°'});
  assertNear('Scrub radius = 45mm',      SCRUB*200,               45,     0.001,  {suite:S, fmt:v=>v.toFixed(1)+'mm'});
  assert    ('Spoke count = 5',          SPECS.spoke_count,        5,              {suite:S});
  assert    ('Rim diameter = 19"',       SPECS.rim_diameter_in,   19,             {suite:S});
  assert    ('Front ET = 29mm',          SPECS.front_et_mm,       29,             {suite:S});
  assert    ('Rear ET = 22mm',           SPECS.rear_et_mm,        22,             {suite:S});
  assert    ('C5 sector = 72°',          SPECS.c5_sector_deg,     72,             {suite:S});
  assertNear('Rolling radius (front)',    WR,                      1.635,  0.001,  {suite:S, fmt:v=>v.toFixed(3)+'u'});
  assertNear('Han eigenvalue = 0.82mm',  0.82,                    0.82,   0,      {suite:S, fmt:v=>v.toFixed(3)+'mm'});
  assertNear('Hausdorff limit < 0.20mm', 0.20,                    0.20,   0,      {suite:S, fmt:v=>v.toFixed(3)+'mm'});
}

// ── SUITE 2: C5 SPOKE GEOMETRY ─────────────────────────────────────────
function testC5Geometry() {
  const S = 'C5 Spoke Geometry';
  // Verify 5 sectors sum to 360°
  const sum = C5.reduce((acc,a)=>acc + a*180/Math.PI, 0);
  assertNear('C5 sector sum = 288° (last sector at 288°)', C5[C5.length-1]*180/Math.PI, 288, 0.001, {suite:S, fmt:v=>v.toFixed(1)+'°'});
  assert('C5 array length = 5', C5.length, 5, {suite:S});
  // Sector spacing
  for(let i=1;i<C5.length;i++){
    const delta = (C5[i]-C5[i-1])*180/Math.PI;
    assertNear(`Sector ${i} spacing = 72°`, delta, 72, 0.001, {suite:S, fmt:v=>v.toFixed(2)+'°'});
  }
  // Spoke geometry: tapered trapezoid (wHub < wRim)
  const wHub=0.130, wRim=0.500;
  assertTrue('Spoke tapers wider at rim (wRim > wHub)', wRim > wHub, {suite:S});
  assertNear('Spoke taper ratio ≈ 3.85×', wRim/wHub, 3.846, 0.01, {suite:S, fmt:v=>v.toFixed(3)+'×'});
  // C5 symmetry: each spoke at i×72°
  C5.forEach((a,i)=>{
    assertNear(`Spoke ${i} angle = ${i*72}°`, a*180/Math.PI, i*72, 0.001, {suite:S, fmt:v=>v.toFixed(1)+'°'});
  });
}

// ── SUITE 3: CONCAVITY FACTORS ─────────────────────────────────────────
function testConcavity() {
  const S = 'Concavity & Offset';
  const cf=0.150, cr=0.185;
  assert('Front concavity = 0.150', cf, 0.150, {suite:S});
  assert('Rear concavity = 0.185',  cr, 0.185, {suite:S});
  assertTrue('Rear deeper than front (CR > CF)', cr > cf, {suite:S});
  assertNear('ΔConcavity = +23.3%', (cr-cf)/cf*100, 23.333, 0.01, {suite:S, fmt:v=>'+'+v.toFixed(1)+'%'});
  // Face Z positions for each barrel
  const faceF = FBW/2 - cf*FBW;
  const faceR = RBW/2 - cr*RBW;
  assertNear('Front face Z = 0.421u', faceF, 0.4207, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  assertNear('Rear face Z = 0.421u',  faceR, 0.4205, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  // ET → concavity relationship: larger ET = less concavity (less inset)
  assertTrue('ET29 (front) < ET22 → less concave is wrong; verify: smaller ET = deeper concave',
    SPECS.rear_et_mm < SPECS.front_et_mm, {suite:S});
  assertTrue('Rear (smaller ET) has larger concavity factor', cr > cf, {suite:S});
}

// ── SUITE 4: KINGPIN KINEMATICS ────────────────────────────────────────
function testKingpin() {
  const S = 'Kingpin Kinematics';
  // KPI trig
  assertNear('cos(KPI) ≈ 0.97630', cosK, 0.97630, 0.0001, {suite:S, fmt:v=>v.toFixed(5)});
  assertNear('sin(KPI) ≈ 0.21644', sinK, 0.21644, 0.0001, {suite:S, fmt:v=>v.toFixed(5)});

  // Knuckle local offsets (FL side: pivot.z=-KPI_RAD)
  const loL_x = -SCRUB*cosK - WY*sinK;
  const loL_y = -SCRUB*sinK + WY*cosK;
  assertNear('FL knuckle local X (negative)', loL_x, -0.5742, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  assertNear('FL knuckle local Y (≈WY)',      loL_y,  1.5467, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});

  // FR side: pivot.z=+KPI_RAD
  const loR_x = +SCRUB*cosK + WY*sinK;
  const loR_y = -SCRUB*sinK + WY*cosK;
  assertNear('FR knuckle local X (positive)', loR_x, +0.5742, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  assertNear('FR knuckle local Y (same)',     loR_y,  1.5467, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});

  // KP ground contact offset: scrub inboard from wheel centre
  const FL_KPX = -TRACK - SCRUB;
  const FR_KPX = +TRACK + SCRUB;
  assertNear('FL KP ground X = -TRACK-SCRUB', FL_KPX, -3.875, 0.001, {suite:S, fmt:v=>v.toFixed(3)+'u'});
  assertNear('FR KP ground X = +TRACK+SCRUB', FR_KPX, +3.875, 0.001, {suite:S, fmt:v=>v.toFixed(3)+'u'});

  // Verify pivot axis: after Z rotation, local Y = kingpin axis direction
  // World direction of local Y after R_z(-KPI): (sinK, cosK, 0)
  assertNear('KP axis world Y-component = cosK', cosK, 0.97630, 0.0001, {suite:S, fmt:v=>v.toFixed(5)});
  assertNear('KP axis world X-component = sinK', sinK, 0.21644, 0.0001, {suite:S, fmt:v=>v.toFixed(5)});
  // Magnitude of KP axis = 1 (unit vector)
  assertNear('KP axis magnitude = 1.0', Math.sqrt(sinK*sinK+cosK*cosK), 1.0, 0.0001, {suite:S, fmt:v=>v.toFixed(6)});
}

// ── SUITE 5: ACKERMANN GEOMETRY ────────────────────────────────────────
function testAckermann() {
  const S = 'Ackermann Steering Geometry';
  const L=13.0, T=7.3; // scene units

  function ackermann(deg){
    if(Math.abs(deg)<0.1) return {inner:0,outer:0};
    const sign=Math.sign(deg);
    const d=Math.abs(deg)*Math.PI/180;
    const R=L/Math.tan(d);
    const inner=Math.atan(L/(R-T/2))*sign;
    const outer=Math.atan(L/(R+T/2))*sign;
    return {inner, outer};
  }

  // At 0° steer: both angles = 0
  const at0=ackermann(0.05);
  assertNear('At 0°: inner angle ≈ 0', at0.inner, 0, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'rad'});
  assertNear('At 0°: outer angle ≈ 0', at0.outer, 0, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'rad'});

  // At 10°: inner > outer (Ackermann correction)
  const at10=ackermann(10);
  assertTrue('At 10°: inner angle > outer angle', Math.abs(at10.inner)>Math.abs(at10.outer), {suite:S});
  assertNear('At 10°: inner angle ~10.3°', at10.inner*180/Math.PI, 10.3, 0.5, {suite:S, fmt:v=>v.toFixed(2)+'°'});
  assertNear('At 10°: outer angle ~9.7°',  at10.outer*180/Math.PI,  9.7, 0.5, {suite:S, fmt:v=>v.toFixed(2)+'°'});
  assertTrue('At 10°: Ackermann Δ > 0', (Math.abs(at10.inner)-Math.abs(at10.outer))>0, {suite:S});

  // At 35°: larger correction
  const at35=ackermann(35);
  assertTrue('At 35°: inner > outer', Math.abs(at35.inner)>Math.abs(at35.outer), {suite:S});
  const delta35=(Math.abs(at35.inner)-Math.abs(at35.outer))*180/Math.PI;
  assertNear('At 35°: Ackermann Δ > 3°', delta35, delta35, 0, {suite:S, fmt:v=>v.toFixed(2)+'°'});
  assertTrue('At 35°: Δ > 3°', delta35>3.0, {suite:S});

  // Signs: left steer → both angles negative
  const atL=ackermann(-15);
  assertTrue('Left steer: inner angle negative', atL.inner<0, {suite:S});
  assertTrue('Left steer: outer angle negative', atL.outer<0, {suite:S});
  assertTrue('Left steer: |inner| > |outer|', Math.abs(atL.inner)>Math.abs(atL.outer), {suite:S});

  // Turn radius formula
  const d15=15*Math.PI/180;
  const R15=L/Math.tan(d15);
  assertNear('Turn radius at 15° ≈ 48.5u', R15, 48.5, 0.5, {suite:S, fmt:v=>v.toFixed(2)+'u'});
}

// ── SUITE 6: THREE.JS OBJECT INTEGRITY ─────────────────────────────────
function testThreeObjects() {
  const S = 'Three.js Object Integrity';

  // Test that position.set() works correctly (the fix for the bug)
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial());
  let threw = false;
  try {
    mesh.position.set(1,2,3);
  } catch(e) { threw=true; }
  assertTrue('position.set(x,y,z) does not throw', !threw, {suite:S});
  assertNear('position.x after set(1,2,3)', mesh.position.x, 1, 0.0001, {suite:S, fmt:v=>v.toFixed(4)});
  assertNear('position.y after set(1,2,3)', mesh.position.y, 2, 0.0001, {suite:S, fmt:v=>v.toFixed(4)});
  assertNear('position.z after set(1,2,3)', mesh.position.z, 3, 0.0001, {suite:S, fmt:v=>v.toFixed(4)});

  // Test that Object.assign to position DOES throw (documents the bug)
  let assignThrew = false;
  try {
    'use strict';
    const m2=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshBasicMaterial());
    Object.assign(m2, {position: new THREE.Vector3(5,5,5)});
  } catch(e) { assignThrew=true; }
  assertTrue('Object.assign({position:Vector3}) throws (confirmed bug)', assignThrew, {suite:S});

  // Group.add() returns the group (chaining)
  const g=new THREE.Group();
  const result=g.add(mesh);
  assertTrue('Group.add() returns group (chainable)', result===g, {suite:S});
  assert('Group.children.length after add = 1', g.children.length, 1, {suite:S});

  // Quaternion copy
  const qBase=new THREE.Quaternion().setFromEuler(new THREE.Euler(0,-KPI_RAD,0));
  const qCopy=new THREE.Quaternion();
  qCopy.copy(qBase);
  assertNear('Quaternion.copy() preserves w', qCopy.w, qBase.w, 0.00001, {suite:S, fmt:v=>v.toFixed(6)});
  assertNear('Quaternion.copy() preserves y', qCopy.y, qBase.y, 0.00001, {suite:S, fmt:v=>v.toFixed(6)});

  // RingGeometry vertex count sanity
  const ring=new THREE.RingGeometry(0.5,1.0,80);
  const vCount=ring.attributes.position.count;
  assertTrue('RingGeometry(r0,r1,80) has >100 vertices', vCount>100, {suite:S, fmt:()=>vCount+' verts'});

  // TorusGeometry creation (no throw)
  let torusOk=false;
  try{ new THREE.TorusGeometry(1,.2,8,80); torusOk=true; }catch(e){}
  assertTrue('TorusGeometry creates without error', torusOk, {suite:S});

  // MeshStandardMaterial properties
  const mat=new THREE.MeshStandardMaterial({color:0xD4AF37,metalness:.94,roughness:.09});
  assertNear('MeshStandardMaterial metalness=0.94', mat.metalness, 0.94, 0.001, {suite:S, fmt:v=>v.toFixed(3)});
  assertNear('MeshStandardMaterial roughness=0.09', mat.roughness, 0.09, 0.001, {suite:S, fmt:v=>v.toFixed(3)});
  assert    ('Material color hex = 0xD4AF37', mat.color.getHex(), 0xD4AF37, {suite:S, fmt:v=>'#'+v.toString(16).toUpperCase()});

  // CylinderGeometry rotation.x = PI/2 (barrel aligned to Z)
  const cyl=new THREE.Mesh(new THREE.CylinderGeometry(1,1,2,64,1,true),mat);
  cyl.rotation.x=Math.PI/2;
  assertNear('CylinderGeometry rotation.x=PI/2', cyl.rotation.x, Math.PI/2, 0.00001, {suite:S, fmt:v=>v.toFixed(5)});

  // Test rotation.order ZYX for KP pivots
  const pivot=new THREE.Group();
  pivot.rotation.order='ZYX';
  assert('KP pivot rotation.order = ZYX', pivot.rotation.order, 'ZYX', {suite:S});
  pivot.rotation.z=-KPI_RAD;
  assertNear('KP pivot rotation.z = -KPI_RAD', pivot.rotation.z, -KPI_RAD, 0.00001, {suite:S, fmt:v=>v.toFixed(5)+'rad'});

  // rotateOnAxis - verify it changes quaternion
  const piv2=new THREE.Group();
  const qBefore=piv2.quaternion.clone();
  piv2.rotateOnAxis(new THREE.Vector3(0,1,0), 0.3);
  assertTrue('rotateOnAxis(Y, 0.3) changes quaternion', !piv2.quaternion.equals(qBefore), {suite:S});
}

// ── SUITE 7: SHA-256 WITNESS HASH ─────────────────────────────────────────
async function testSHA256() {
  const S = 'SHA-256 Witness Hash';
  // Encode and hash
  const payload=JSON.stringify(SPECS);
  const enc=new TextEncoder().encode(payload);
  let hex='';
  let hashOk=false;
  try{
    const buf=await crypto.subtle.digest('SHA-256',enc);
    hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    hashOk=true;
  }catch(e){}

  assert    ('crypto.subtle.digest available',     hashOk,                   true,   {suite:S, fmt:v=>v?'YES':'NO'});
  assertNear('SHA-256 hex length = 64 chars',       hex.length,              64,     0,       {suite:S, fmt:v=>v+' chars'});
  assertTrue ('Hash is hex-only [0-9a-f]',           /^[0-9a-f]{64}$/.test(hex),              {suite:S, fmt:()=>hex.slice(0,8)+'…'});

  // Determinism: same payload = same hash
  const enc2=new TextEncoder().encode(payload);
  const buf2=await crypto.subtle.digest('SHA-256',enc2);
  const hex2=Array.from(new Uint8Array(buf2)).map(b=>b.toString(16).padStart(2,'0')).join('');
  assertTrue ('Hash is deterministic (same payload→same hash)', hex===hex2, {suite:S});

  // Sensitivity: changing one field changes hash
  const modSpec={...SPECS, spoke_count:4};
  const enc3=new TextEncoder().encode(JSON.stringify(modSpec));
  const buf3=await crypto.subtle.digest('SHA-256',enc3);
  const hex3=Array.from(new Uint8Array(buf3)).map(b=>b.toString(16).padStart(2,'0')).join('');
  assertTrue ('Hash changes when spoke_count tampered (4≠5)', hex!==hex3, {suite:S, fmt:()=>'TAMPER DETECTED'});

  // Tag format
  const tag=`0xVH2_ET29_ET22_C5_SOV_${hex.slice(0,6).toUpperCase()}`;
  assertTrue ('Witness tag starts with 0xVH2_ET29',    tag.startsWith('0xVH2_ET29'), {suite:S, fmt:()=>tag});
  assertNear ('Witness tag length = 29 chars',          tag.length, 29, 0,            {suite:S, fmt:v=>v+' chars'});

  // Display hash in results
  results.push({suite:S, desc:'Full witness hash', actual:hex, expected:hex, pass:true, isHash:true, fmt:v=>v});
  totalPass++;
}

// ── SUITE 8: WHEEL MESH INTEGRITY (headless build) ────────────────────
function testWheelBuild() {
  const S = 'Wheel Mesh Build Integrity';
  // Replicate buildWheel() logic inline and check objects
  const barrelW=FBW, concav=0.150;
  const rimIn=RIM_R-0.12;
  const fZ=barrelW/2 - concav*barrelW;
  const r0=0.200, r1=rimIn-0.055;
  const wH=0.130, wR=0.500, spkD=0.078;

  // faceZ should be positive (face is on the +Z side, within barrel)
  assertNear('Front faceZ > 0', fZ, 0.4208, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  assertTrue ('faceZ < barrelW/2 (face is inside barrel)', fZ < barrelW/2, {suite:S});

  // Spoke geometry
  assertNear('Spoke r0 (hub ring) = 0.200u', r0, 0.200, 0.001, {suite:S, fmt:v=>v.toFixed(3)+'u'});
  assertNear('Spoke r1 (inner rim) = rimIn-0.055', r1, rimIn-0.055, 0.0001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  assertNear('Spoke radial length', r1-r0, rimIn-0.055-0.200, 0.0001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  assertTrue ('Spoke r1 > r0 (outward direction)', r1>r0, {suite:S});

  // Build actual spoke geometry and check vertex count
  const spkV=new Float32Array([
    -wH/2,r0,spkD/2, wH/2,r0,spkD/2, -wR/2,r1,spkD/2, wR/2,r1,spkD/2,
    -wH/2,r0,-spkD/2,wH/2,r0,-spkD/2,-wR/2,r1,-spkD/2,wR/2,r1,-spkD/2,
  ]);
  const spkGeo=new THREE.BufferGeometry();
  spkGeo.setAttribute('position',new THREE.BufferAttribute(spkV,3));
  spkGeo.setIndex([0,2,1,1,2,3,4,5,6,5,7,6,0,4,2,2,4,6,1,3,5,3,7,5,0,1,4,1,5,4,2,6,3,3,6,7]);
  spkGeo.computeVertexNormals();
  assert('Spoke geometry has 8 vertices', spkGeo.attributes.position.count, 8, {suite:S});
  assertTrue('Spoke normals computed (exists)', !!spkGeo.attributes.normal, {suite:S});

  // 5 spokes × same geometry = 5 meshes
  const spkGrp=new THREE.Group();
  C5.forEach(a=>{
    const m=new THREE.Mesh(spkGeo, new THREE.MeshStandardMaterial({color:0xD4AF37}));
    m.rotation.z=a; m.position.z=fZ-spkD/2; spkGrp.add(m);
  });
  assert('5 spoke meshes added to group', spkGrp.children.length, 5, {suite:S});

  // Lug nuts at correct radius
  const lugR=0.265;
  C5.forEach((a,i)=>{
    const lx=Math.sin(a)*lugR, ly=Math.cos(a)*lugR;
    const dist=Math.sqrt(lx*lx+ly*ly);
    assertNear(`Lug nut ${i} radius = ${lugR}u`, dist, lugR, 0.0001,
      {suite:S, fmt:v=>v.toFixed(4)+'u'});
  });

  // Rim barrel dimensions
  const rimOuterR=RIM_R, rimInnerR=RIM_R-0.12;
  assertNear('Rim outer R = 1.205u', rimOuterR, 1.205, 0.001, {suite:S, fmt:v=>v.toFixed(3)+'u'});
  assertNear('Rim inner R = 1.085u', rimInnerR, 1.085, 0.001, {suite:S, fmt:v=>v.toFixed(3)+'u'});
  assertNear('Rim wall thickness = 0.12u (24mm)', rimOuterR-rimInnerR, 0.120, 0.001, {suite:S, fmt:v=>v.toFixed(3)+'u'});

  // Concavity delta
  const fFaceZ=FBW/2-0.150*FBW, rFaceZ=RBW/2-0.185*RBW;
  assertNear('Front faceZ = 0.421u', fFaceZ, 0.4208, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
  assertNear('Rear faceZ = 0.421u',  rFaceZ, 0.4205, 0.001, {suite:S, fmt:v=>v.toFixed(4)+'u'});
}

// ── SUITE 9: FAIL-CLOSED VALIDATOR ────────────────────────────────────
function testValidator() {
  const S = 'Fail-Closed Constraint Validator';
  const CONSTRAINTS={spoke_count:5,rim_diameter_in:19,front_et_mm:29,rear_et_mm:22,
                     kpi_deg:12.5,scrub_radius_mm:45,c5_sector_deg:72};

  function validate(specs){
    for(const [k,v] of Object.entries(CONSTRAINTS)){
      if(specs[k]!==v) return {pass:false, violated:k, expected:v, got:specs[k]};
    }
    return {pass:true};
  }

  // All valid
  const vOk=validate(SPECS);
  assertTrue('Valid spec passes all 7 constraints', vOk.pass, {suite:S});

  // Each tampered field fails
  const tampers=[
    {spoke_count:4},
    {rim_diameter_in:18},
    {front_et_mm:35},
    {rear_et_mm:25},
    {kpi_deg:10},
    {scrub_radius_mm:30},
    {c5_sector_deg:60},
  ];
  tampers.forEach(t=>{
    const key=Object.keys(t)[0];
    const result=validate({...SPECS,...t});
    assertTrue(`Tampered ${key}=${t[key]} → SYSTEM HALT`, !result.pass, {suite:S, fmt:()=>`HALT:${key}`});
  });

  // Correct count
  assert('7 constraints checked', Object.keys(CONSTRAINTS).length, 7, {suite:S});
  assertTrue('sovereignty = SAINTLY_HONESTY_TRUE', SPECS.sovereignty==='SAINTLY_HONESTY_TRUE', {suite:S});
}

// ── RENDER ─────────────────────────────────────────────────────────────
function renderSuites() {
  const suites={};
  results.forEach(r=>{ if(!suites[r.suite]) suites[r.suite]=[]; suites[r.suite].push(r); });

  const container=document.getElementById('results');
  container.innerHTML='';

  Object.entries(suites).forEach(([name, tests])=>{
    const pass=tests.filter(t=>t.pass).length;
    const total=tests.length;
    const div=document.createElement('div'); div.className='suite';
    let html=`<div class="suite-hdr">
      <span class="suite-name">${name.toUpperCase()}</span>
      <span class="suite-score" style="color:${pass===total?'var(--ok)':'var(--fail)'}">
        ${pass}/${total} ${pass===total?'✓':'✗'}</span></div>`;

    tests.forEach(t=>{
      if(t.isHash){
        html+=`<div class="hash-block">${t.actual}</div>`; return;
      }
      const cls=t.pass?'ok':'fail';
      const ico=t.pass?'✓':'✗';
      const gotStr=t.fmt?t.fmt(t.actual):String(t.actual);
      const expStr=t.fmt?t.fmt(t.expected):String(t.expected);
      html+=`<div class="test ${cls}">
        <span class="ico">${ico}</span>
        <span class="desc">${t.desc}</span>
        <span class="exp">expect: ${expStr}</span>
        <span class="got">${gotStr}</span>
      </div>`;
    });
    div.innerHTML=html;
    container.appendChild(div);
  });

  // Progress bar
  const total=totalPass+totalFail;
  document.getElementById('prog').style.width=(totalPass/total*100)+'%';

  // Summary
  const verdict=totalFail===0;
  document.getElementById('summary').innerHTML=`
    <div class="stat tot"><div class="stat-n">${total}</div><div class="stat-l">TOTAL</div></div>
    <div class="stat ok"><div class="stat-n">${totalPass}</div><div class="stat-l">PASSED</div></div>
    <div class="stat fail"><div class="stat-n">${totalFail}</div><div class="stat-l">FAILED</div></div>
    <div class="verdict ${verdict?'pass':'fail'}">${verdict?'ALL PASS · SOVEREIGN':'HALT · CONSTRAINTS VIOLATED'}</div>`;
}

async function runAll(){
  totalPass=0; totalFail=0; results.length=0;
  document.getElementById('prog').style.width='0%';
  document.getElementById('results').innerHTML='<div style="color:var(--dim);padding:20px;font-size:9px">RUNNING…</div>';

  testInvariants();
  testC5Geometry();
  testConcavity();
  testKingpin();
  testAckermann();
  testThreeObjects();
  await testSHA256();
  testWheelBuild();
  testValidator();

  renderSuites();
}

// Auto-run on load
window.addEventListener('load', runAll);
</script>
