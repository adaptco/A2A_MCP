apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "a2a-mcp.configName" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name | default "a2a-mcp" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  ENV: {{ .Values.config.environment | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}

  RBAC_ENABLED: {{ ternary "true" "false" .Values.config.rbacEnabled | quote }}
  RBAC_URL: {{ .Values.config.rbacUrl | quote }}
  AUTH_DISABLED: {{ ternary "true" "false" .Values.config.authDisabled | quote }}

  LLM_ENDPOINT: {{ .Values.config.llmEndpoint | quote }}
  LLM_MODEL: {{ .Values.config.llmModel | quote }}
  LLM_TIMEOUT_SECONDS: {{ .Values.config.llmTimeoutSeconds | quote }}

  OIDC_ENFORCE: {{ ternary "true" "false" .Values.config.oidc.enforce | quote }}
  OIDC_ISSUER: {{ .Values.config.oidc.issuer | quote }}
  OIDC_AUDIENCE: {{ .Values.config.oidc.audience | quote }}
  OIDC_JWKS_URL: {{ .Values.config.oidc.jwksUrl | quote }}
  OIDC_AVATAR_REPOSITORY_ALLOWLIST: {{ .Values.config.oidc.avatarRepositoryAllowlist | quote }}
  OIDC_AVATAR_ACTOR_ALLOWLIST: {{ .Values.config.oidc.avatarActorAllowlist | quote }}

  AVATAR_TOKEN_ALGORITHM: {{ .Values.config.avatarTokenAlgorithm | quote }}
  AVATAR_TOKEN_TTL_SECONDS: {{ .Values.config.avatarTokenTtlSeconds | quote }}
