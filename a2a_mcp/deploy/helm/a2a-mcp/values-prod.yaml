images:
  mcp:
    repository: ghcr.io/adaptco/a2a-mcp-mcp
    tag: latest
  orchestrator:
    repository: ghcr.io/adaptco/a2a-mcp-orchestrator
    tag: latest

database:
  mode: postgres
  postgres:
    credentials:
      database: mcp_db

config:
  environment: production
  rbacEnabled: true
  authDisabled: false
  oidc:
    enforce: true
    issuer: https://token.actions.githubusercontent.com
    audience: ""
    jwksUrl: https://token.actions.githubusercontent.com/.well-known/jwks
    avatarRepositoryAllowlist: adaptco/A2A_MCP
    avatarActorAllowlist: github-actions[bot]

ingress:
  enabled: true
  host: a2a-mcp.example.com
  tls:
    enabled: true
    secretName: a2a-mcp-tls
