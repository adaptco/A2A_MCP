###############################################################################
# A2A_MCP — Digital Twin Stack
#
# Extends docker-compose.unified.yml with Digital Twin services and the
# Deployment Bot governance agent.
#
# Usage:
#   docker compose -f docker-compose.twin.yml up -d --build
#   docker compose -f docker-compose.twin.yml down -v
###############################################################################

services:

  # ─── Data Layer ────────────────────────────────────────────────────────

  db:
    image: postgres:15
    container_name: a2a-twin-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twin-pass}
      POSTGRES_DB: ${POSTGRES_DB:-a2a_twin}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_twin:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: a2a-twin-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Orchestrator ──────────────────────────────────────────────────────

  orchestrator:
    build: .
    container_name: a2a-twin-orchestrator
    ports:
      - "8010:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-twin-pass}@db:5432/${POSTGRES_DB:-a2a_twin}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Digital Twin Node Mesh ────────────────────────────────────────────
  # agent-mesh: placeholder for IsometricGrid + NodeAgent Python service
  # This will be wired up when the core twin code is implemented (Option B).

  agent-mesh:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: a2a-twin-agent-mesh
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    restart: unless-stopped

  # ─── Deployment Bot (Governance Layer) ────────────────────────────────

  deployment-bot:
    build:
      context: .
      dockerfile: deployment_bot/Dockerfile.bot
    container_name: a2a-twin-deployment-bot
    depends_on:
      - orchestrator
      - agent-mesh
    environment:
      COMPOSE_FILE: docker-compose.twin.yml
      PROJECT_NAME: a2a-twin
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-30}
      RECOVERY_ATTEMPTS: ${RECOVERY_ATTEMPTS:-3}
      RECOVERY_DELAY: ${RECOVERY_DELAY:-10}
      ACTION: ${BOT_ACTION:-monitor}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs/deployment_bot:/var/log/deployment_bot
    restart: unless-stopped

volumes:
  pgdata_twin:
