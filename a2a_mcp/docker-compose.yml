services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mcp_db
    ports:
      - "5432:5432"
  orchestrator:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:pass@db:5432/mcp_db
      LLM_API_KEY: "mock-key-for-local-dev"
      LLM_ENDPOINT: "https://api.mistral.ai/v1/chat/completions"
      LLM_MODEL: "gpt-4o-mini"
      ENV: "development"
      RBAC_ENABLED: "true"
      RBAC_URL: "http://rbac:8001"

  rbac:
    build: ./rbac
    ports:
      - "8001:8001"
    environment:
      RBAC_SECRET: dev-secret-change-me
