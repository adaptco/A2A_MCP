name: Qube CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node.js Package
      run: npm install -g @openai/codex

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Stack
      run: docker-compose build

    - name: Start MCP Server
      # We start only the MCP server first to ensure it's ready for the integration test
      run: docker-compose up -d mcp-server

    - name: Wait for Server Readiness
      run: sleep 10

    - name: Lint with Pylint
      run: |
        docker-compose run --rm --entrypoint "" orchestrator \
        sh -c "pip install pylint && pylint --fail-under=8.0 $(git ls-files '*.py')"

    - name: Lint with flake8
      run: |
        docker-compose run --rm --entrypoint "" orchestrator \
        sh -c "pip install flake8 && flake8 $(git ls-files '*.py')"

    - name: Run Unit Tests
      # Runs pytest inside the orchestrator container environment
      run: |
        docker-compose run --rm --entrypoint "" orchestrator \
        sh -c "pip install -r requirements-dev.txt && cd A2A_MCP && pytest tests/test_intent_engine.py tests/test_full_pipeline.py -v --tb=short"

    - name: Run Integration Tests
      # Runs the integration script which connects to the running mcp-server
      run: |
        docker-compose run --rm --entrypoint "" orchestrator \
        sh -c "pip install -r requirements-dev.txt && cd A2A_MCP && python integration_test.py"

    - name: Tear Down
      if: always()
      run: docker-compose down