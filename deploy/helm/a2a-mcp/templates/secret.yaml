{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "a2a-mcp.secretName" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name | default "a2a-mcp" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  RBAC_SECRET: {{ .Values.secrets.rbacSecret | quote }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}

  # Avatar token keys used by container env vars.
  AVATAR_TOKEN_SIGNING_KEY: {{ .Values.secrets.avatarTokenSigningKey | quote }}
  AVATAR_TOKEN_VALIDATION_KEY: {{ .Values.secrets.avatarTokenValidationKey | quote }}
{{- if eq .Values.database.mode "postgres" }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%v/%s" .Values.secrets.postgresUser .Values.secrets.postgresPassword (include "a2a-mcp.postgresServiceName" .) .Values.database.postgres.servicePort .Values.database.postgres.credentials.database | quote }}
{{- else }}
  DATABASE_URL: {{ printf "sqlite:///%s" .Values.database.sqlite.path | quote }}
{{- end }}
{{- end }}
