###############################################################################
# A2A_MCP — Automation Environment
#
# Lightweight stack for browser-driven automations. It exposes the runtime
# scenario API used by the simulator shell and serves a stable frontend build
# for Playwright or desktop automation runs.
#
# Usage:
#   docker compose -f docker-compose.automation.yml --env-file .env.automation up -d --build
#   docker compose -f docker-compose.automation.yml --env-file .env.automation down -v
###############################################################################

services:
  automation-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: a2a-automation-runtime
    command: ["python", "-m", "uvicorn", "app.multi_client_api:app", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      A2A_FORENSIC_NDJSON: ${A2A_FORENSIC_NDJSON:-/tmp/a2a_runtime_scenario_audit.ndjson}
      A2A_FRONTEND_ALLOWED_ORIGINS: ${A2A_FRONTEND_ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
    ports:
      - "${AUTOMATION_RUNTIME_API_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  automation-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.automation
      args:
        VITE_RUNTIME_API_BASE_URL: ${VITE_RUNTIME_API_BASE_URL:-http://localhost:8010}
    container_name: a2a-automation-frontend
    depends_on:
      automation-runtime:
        condition: service_healthy
    ports:
      - "${AUTOMATION_FRONTEND_PORT:-4173}:4173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
