apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: wham-validator-slo
  namespace: default
spec:
  args:
  - name: service-name
  metrics:
  - name: wham-gate-success-rate
    interval: 1m
    successCondition: result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(wham_gate_passed_total{service="{{args.service-name}}", status="success"}[2m]))
          /
          sum(rate(wham_gate_passed_total{service="{{args.service-name}}"}[2m]))
