apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-control-plane-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-control-plane-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "watch", "list"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-control-plane-policy
spec:
  podSelector:
    matchLabels:
      app: mcp-control-plane
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: mcp-control-plane
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: mcp-control-plane
