services:
  - type: web
    name: a2a-mcp-orchestrator
    runtime: python
    autoDeployTrigger: off
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn orchestrator.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: a2a-mcp-postgres
          property: connectionString
      - key: ENV
        value: production
      - key: AUTH_DISABLED
        value: "false"
      - key: RBAC_ENABLED
        value: "false"
      - key: MCP_EXECUTION_MODE
        value: local
      - key: OIDC_ENFORCE
        value: "true"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_ENDPOINT
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: AIRTABLE_PAT
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: RBAC_ADMIN_USERS
        sync: false
      - key: OIDC_ISSUER
        sync: false
      - key: OIDC_AUDIENCE
        sync: false
      - key: OIDC_JWKS_URL
        sync: false

databases:
  - name: a2a-mcp-postgres
    databaseName: a2a_mcp
