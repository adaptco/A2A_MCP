apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: production
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: production
        service: agent-runner

    scrape_configs:
      - job_name: 'agent-runner'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - production
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-rules
  namespace: production
data:
  alert-rules.yml: |
    groups:
      - name: agent-runner
        interval: 30s
        rules:
          # Pod restart alerting
          - alert: PodRestartingTooOften
            expr: rate(kube_pod_container_status_restarts_total{pod=~"agent-runner-.*"}[15m]) > 0.1
            for: 5m
            annotations:
              summary: "Pod {{ $labels.pod }} restarting too often"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last 15 minutes"

          # High CPU usage
          - alert: HighCPUUsage
            expr: sum(rate(container_cpu_usage_seconds_total{pod=~"agent-runner-.*"}[5m])) by (pod) > 0.8
            for: 5m
            annotations:
              summary: "High CPU usage for {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of CPU"

          # High memory usage
          - alert: HighMemoryUsage
            expr: sum(container_memory_usage_bytes{pod=~"agent-runner-.*"}) by (pod) / sum(container_spec_memory_limit_bytes{pod=~"agent-runner-.*"}) by (pod) > 0.8
            for: 5m
            annotations:
              summary: "High memory usage for {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of memory"

          # Deployment not ready
          - alert: DeploymentNotReady
            expr: kube_deployment_status_replicas_unavailable{deployment="agent-runner", namespace="production"} > 0
            for: 5m
            annotations:
              summary: "Deployment agent-runner has unavailable replicas"
              description: "{{ $value }} replicas of agent-runner are not ready"

          # High error rate (assuming /metrics endpoint exposes http_requests_total)
          - alert: HighErrorRate
            expr: rate(http_requests_total{pod=~"agent-runner-.*", status=~"5.."}[5m]) > 0.05
            for: 5m
            annotations:
              summary: "High error rate for {{ $labels.pod }}"
              description: "Error rate is {{ $value | humanizePercentage }} for pod {{ $labels.pod }}"

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-runner
  namespace: production
  labels:
    app: agent-runner
spec:
  selector:
    matchLabels:
      app: agent-runner
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
