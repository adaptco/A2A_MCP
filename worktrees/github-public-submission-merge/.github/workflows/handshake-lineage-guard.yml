name: Handshake Lineage Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-handshake-lineage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate handshake payloads, entropy config, Han eigenvalue, and NDJSON witness rules
        run: |
          python scripts/verify_handshake_lineage.py \
            --ndjson-glob 'fixtures/handshake/*.ndjson' \
            --schema-glob 'fixtures/handshake/*.schema.json'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SDK handshake lineage tests
        run: |
          npm --prefix packages/sdk ci
          npm --prefix packages/sdk test
